name: Fixture
options:
  bundleIdPrefix: dev.gen-a.localelint.fixture
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
targets:
  Fixture:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Fixture
    info:
      path: Sources/Fixture/Info.plist
      properties:
        CFBundleDisplayName: Fixture
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: dev.gen-a.localelint.fixture.app
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
